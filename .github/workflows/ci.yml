name: NPU CI

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to run NPU CI for"
        required: true
      ci_mode:
        description: "CI mode: quick or full"
        required: false
        default: quick
      ops:
        description: "Optional comma-separated operator list"
        required: false
        default: ''
      example_args:
        description: "Optional extra args for examples/flash_gated_delta_rule.py; empty keeps original shape"
        required: false
        default: ''

jobs:
  prepare:
    name: 准备 NPU CI
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        startsWith(github.event.comment.body, '/run-npu-ci')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: read
      statuses: write
    outputs:
      should_run: ${{ steps.prepare.outputs.should_run }}
      pr_number: ${{ steps.prepare.outputs.pr_number }}
      head_repo: ${{ steps.prepare.outputs.head_repo }}
      head_sha: ${{ steps.prepare.outputs.head_sha }}
      ci_mode: ${{ steps.prepare.outputs.ci_mode }}
      ops: ${{ steps.prepare.outputs.ops }}
      example_args: ${{ steps.prepare.outputs.example_args }}
      comment_id: ${{ steps.prepare.outputs.comment_id }}
    steps:
      - name: Resolve PR and requested CI mode
        id: prepare
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.NPU_CI_BOT_TOKEN || github.token }}
          script: |
            const maintainers = new Set([
              'juyangokok',
              'weinachuan',
              'weiwei-612',
              'woey',
              'zhangshuolei-hfut',
              'chen-linxin',
            ]);
            const actor = context.actor;
            if (!maintainers.has(actor)) {
              core.setFailed(`${actor} 无权触发 NPU CI。`);
              return;
            }

            const contextName = 'NPU CI / 手动验证';
            let prNumber;
            let ciMode = 'quick';
            let ops = '';
            let exampleArgs = '';
            let commentId = '';
            const upsertComment = async (pr, body) => {
              if (!prNumber || !pr) {
                return '';
              }
              const marker = `<!-- npu-ci:pr=${prNumber}:sha=${pr.head.sha} -->`;
              const fullBody = `${marker}\n${body}`;
              try {
                const comments = await github.paginate(github.rest.issues.listComments, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  per_page: 100,
                });
                const existing = comments
                  .filter((comment) =>
                    comment.user &&
                    comment.user.type === 'Bot' &&
                    typeof comment.body === 'string' &&
                    comment.body.includes(marker)
                  )
                  .sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at))[0];

                if (existing) {
                  await github.rest.issues.updateComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    comment_id: existing.id,
                    body: fullBody,
                  });
                  return String(existing.id);
                }

                const { data: comment } = await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: fullBody,
                });
                return String(comment.id);
              } catch (error) {
                core.warning(`Unable to create or update PR comment: ${error.message}`);
                return '';
              }
            };

            if (context.eventName === 'workflow_dispatch') {
              prNumber = Number(core.getInput('pr_number', { required: true }));
              ciMode = core.getInput('ci_mode') || 'quick';
              ops = core.getInput('ops') || '';
              exampleArgs = core.getInput('example_args') || '';
            } else {
              prNumber = context.payload.issue.number;
              const body = (context.payload.comment.body || '').trim();
              const parts = body.split(/\s+/).slice(1);
              for (const part of parts) {
                if (part === 'quick' || part === 'full') {
                  ciMode = part;
                } else if (part.startsWith('ops=')) {
                  ops = part.slice('ops='.length);
                } else if (part.startsWith('example_args=')) {
                  exampleArgs = part.slice('example_args='.length);
                }
              }
            }

            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              core.setFailed(`无效的 PR 编号：${prNumber}`);
              return;
            }
            if (!['quick', 'full'].includes(ciMode)) {
              core.setFailed(`不支持的 CI 模式：${ciMode}`);
              return;
            }
            if (/[\r\n]/.test(exampleArgs)) {
              core.setFailed('example_args 必须写在一行内。');
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            if (pr.draft) {
              core.setFailed(`PR #${prNumber} 仍是草稿，请先标记为 ready for review 后再运行 NPU CI。`);
              return;
            }

            const statuses = await github.paginate(github.rest.repos.listCommitStatusesForRef, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pr.head.sha,
              per_page: 100,
            });
            const latestManualCi = statuses.find((status) => status.context === contextName);
            const latestPassedWithExample = latestManualCi &&
              latestManualCi.state === 'success' &&
              (latestManualCi.description || '').includes('+example');
            if (latestPassedWithExample) {
              core.notice(`${pr.head.sha} 已经通过 NPU CI，跳过重复运行。`);
              commentId = await upsertComment(
                pr,
                [
                  `NPU CI 已经在 \`${pr.head.sha}\` 上通过，本次不会重复运行。`,
                  '',
                  `- 请求模式：\`${ciMode}\``,
                  `- 触发人：@${actor}`,
                  '- Example ST：已覆盖',
                ].join('\n')
              );
              core.setOutput('should_run', 'false');
              core.setOutput('pr_number', String(prNumber));
              core.setOutput('head_repo', pr.head.repo.full_name);
              core.setOutput('head_sha', pr.head.sha);
              core.setOutput('ci_mode', ciMode);
              core.setOutput('ops', ops);
              core.setOutput('example_args', exampleArgs);
              core.setOutput('comment_id', commentId);
              return;
            }

            const targetUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: pr.head.sha,
              state: 'pending',
              context: contextName,
              description: `NPU CI 已由 @${actor} 触发 (${ciMode}+example)`,
              target_url: targetUrl,
            });
            commentId = await upsertComment(
              pr,
              [
                `NPU CI 已开始验证 \`${pr.head.sha}\`。`,
                '',
                `- 模式：\`${ciMode}\``,
                `- 触发人：@${actor}`,
                '- Example ST：必跑',
                ops ? `- 算子：\`${ops}\`` : '',
                `- 运行链接：[NPU CI #${context.runNumber}](${targetUrl})`,
              ].filter(Boolean).join('\n')
            );

            core.setOutput('should_run', 'true');
            core.setOutput('pr_number', String(prNumber));
            core.setOutput('head_repo', pr.head.repo.full_name);
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('ci_mode', ciMode);
            core.setOutput('ops', ops);
            core.setOutput('example_args', exampleArgs);
            core.setOutput('comment_id', commentId);

  ascend-npu:
    name: Ascend NPU 验证
    needs: prepare
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: [self-hosted, linux, arm64, npu, flash-linear-attention-npu]
    timeout-minutes: 240
    permissions:
      contents: read
      issues: write
      statuses: write
    env:
      CI_MODE: ${{ needs.prepare.outputs.ci_mode }}
      CI_OPS: ${{ needs.prepare.outputs.ops }}
      CI_RUN_EXAMPLE_ST: 'true'
      CI_EXAMPLE_ARGS: ${{ needs.prepare.outputs.example_args }}
      CI_IMAGE: fla-npu-ci:8.5.0-910b
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.prepare.outputs.head_repo }}
          ref: ${{ needs.prepare.outputs.head_sha }}
          fetch-depth: 1
          path: repo

      - name: Checkout trusted CI scripts
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1
          path: trusted-ci

      - name: Use trusted CI scripts
        run: |
          rm -rf repo/ci
          cp -a trusted-ci/ci repo/ci

      - name: Run NPU CI container
        working-directory: repo
        run: bash ci/run_ci_container.sh

      - name: Publish NPU CI status
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.NPU_CI_BOT_TOKEN || github.token }}
          script: |
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure';
            const mode = ${{ toJson(needs.prepare.outputs.ci_mode) }};
            const ops = ${{ toJson(needs.prepare.outputs.ops) }};
            const sha = ${{ toJson(needs.prepare.outputs.head_sha) }};
            const prNumber = ${{ toJson(needs.prepare.outputs.pr_number) }};
            const commentId = ${{ toJson(needs.prepare.outputs.comment_id) }};
            const targetUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state,
              context: 'NPU CI / 手动验证',
              description: state === 'success' ? `NPU CI 通过 (${mode}+example)` : `NPU CI 失败 (${mode}+example)`,
              target_url: targetUrl,
            });
            const result = state === 'success' ? '通过' : '失败';
            const commentBody = [
              `<!-- npu-ci:pr=${prNumber}:sha=${sha} -->`,
              `NPU CI ${result}：\`${sha}\`。`,
              '',
              `- 模式：\`${mode}\``,
              `- 触发人：@${context.actor}`,
              '- Example ST：必跑',
              ops ? `- 算子：\`${ops}\`` : '',
              `- 运行链接：[NPU CI #${context.runNumber}](${targetUrl})`,
            ].filter(Boolean).join('\n');

            try {
              if (commentId) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: Number(commentId),
                  body: commentBody,
                });
              } else if (prNumber) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: Number(prNumber),
                  body: commentBody,
                });
              }
            } catch (error) {
              core.warning(`Unable to create or update PR comment: ${error.message}`);
            }

name: 仓库规则

on:
  create:
  pull_request_target:
    types: [opened, edited, reopened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed]

jobs:
  branch-creation-guard:
    name: 分支创建权限检查
    if: github.event_name == 'create' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 删除未授权分支
        uses: actions/github-script@v7
        with:
          script: |
            const allowed = new Set([
              'juyangokok',
              'weinachuan',
              'weiwei-612',
              'woey',
              'zhangshuolei-hfut',
              'chen-linxin',
            ]);
            const actor = context.actor;
            const branch = context.payload.ref;
            if (allowed.has(actor)) {
              core.notice(`${actor} 允许在主仓库创建分支。`);
              return;
            }

            await github.rest.git.deleteRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${branch}`,
            });
            core.setFailed(
              `${actor} 无权在主仓库创建分支 "${branch}"。` +
              '请先 fork 本仓库，再从个人仓库向主仓库提交 Pull Request。'
            );

  pull-request-author:
    name: 自动填写 PR 提交人
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: 填写 PR 提交人
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            const authorLine = `- 责任人 / 提交人: @${pr.user.login}`;
            const marker = /- 责任人 \/ 提交人:[^\n]*/;
            if (!marker.test(body)) {
              core.notice('PR 描述中没有找到责任人 / 提交人标记。');
              return;
            }
            const nextBody = body.replace(marker, authorLine);
            if (nextBody === body) {
              core.notice('PR 提交人已经填写。');
              return;
            }
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              body: nextBody,
            });

  required-reviewers:
    name: 维护者检视门禁
    if: github.event_name == 'pull_request_target' || github.event_name == 'pull_request_review'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: 检查维护者审批数量
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.notice('没有找到 Pull Request 事件信息。');
              return;
            }
            if (pr.draft) {
              core.notice('草稿 PR 暂不检查检视门禁，标记为 ready for review 后再检查。');
              return;
            }

            const maintainers = new Set([
              'juyangokok',
              'weinachuan',
              'weiwei-612',
              'woey',
              'zhangshuolei-hfut',
              'chen-linxin',
            ]);
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const approvals = new Map();
            for (const review of reviews) {
              const login = review.user && review.user.login;
              if (!login || !maintainers.has(login) || login === pr.user.login) {
                continue;
              }
              if (review.state === 'APPROVED' && review.commit_id === pr.head.sha) {
                approvals.set(login, review);
              } else if (review.state === 'CHANGES_REQUESTED' || review.state === 'DISMISSED') {
                approvals.delete(login);
              }
            }

            const approvedBy = [...approvals.keys()].sort();
            await core.summary
              .addHeading('仓库检视门禁')
              .addRaw(`要求的维护者审批数：2\n\n`)
              .addRaw(`当前 head SHA：${pr.head.sha}\n\n`)
              .addRaw(`已通过检视：${approvedBy.length ? approvedBy.map((u) => `@${u}`).join(', ') : '暂无'}\n`)
              .write();

            if (approvedBy.length < 2) {
              core.setFailed(
                `需要至少 2 个维护账号在当前 head commit 上检视通过。` +
                `当前有效审批数：${approvedBy.length}。`
              );
            }
